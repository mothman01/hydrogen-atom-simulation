name: Build & Release

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  # ── Linux ──────────────────────────────────────────────────────────────
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libglfw3-dev libglm-dev libgl-dev libglew-dev

      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: atom-sim-linux
          path: |
            build/atom_sim
            shaders/

  # ── macOS ──────────────────────────────────────────────────────────────
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install cmake glfw glm glew

      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Prepare .app bundle
        run: |
          if [ ! -d build/atom_sim.app ]; then
            echo "Error: build/atom_sim.app not found. Build may have failed." >&2
            exit 1
          fi
          mv build/atom_sim.app AtomSim.app
          mkdir -p AtomSim.app/Contents/Resources/shaders
          cp -R shaders/. AtomSim.app/Contents/Resources/shaders/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: atom-sim-macos
          path: AtomSim.app

  # ── Windows ────────────────────────────────────────────────────────────
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (vcpkg)
        run: |
          vcpkg install glfw3:x64-windows glm:x64-windows glew:x64-windows

      - name: Configure
        run: |
          cmake -B build -S . `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Package
        run: |
          mkdir atom-sim-windows
          cp build/Release/atom_sim.exe atom-sim-windows/
          cp -r shaders atom-sim-windows/
          # Create a simple launcher batch file
          echo '@echo off' > atom-sim-windows/AtomSim.bat
          echo 'start "" "%~dp0atom_sim.exe"' >> atom-sim-windows/AtomSim.bat

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: atom-sim-windows
          path: atom-sim-windows/

  # ── Unit tests ─────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: linux
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libglfw3-dev libglm-dev libgl-dev libglew-dev

      - name: Configure (with tests enabled)
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON

      - name: Build test binary
        run: cmake --build build --target atom_sim_tests --parallel

      - name: Run tests
        run: cd build && ctest --output-on-failure -C Release

  # ── Static analysis ─────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libglfw3-dev libglm-dev libgl-dev libglew-dev \
            clang-tidy cppcheck

      - name: Configure (export compile commands)
        run: |
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DBUILD_TESTS=OFF

      - name: Run clang-tidy
        run: |
          clang-tidy -p build \
            src/wavefunction.cpp \
            src/element_data.cpp \
            --warnings-as-errors='*'

      - name: Run cppcheck
        run: |
          cppcheck --enable=warning,performance,portability \
            --std=c++17 \
            --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            src/wavefunction.cpp \
            src/element_data.cpp

  # ── Release (on tag push) ──────────────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux, macos, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: atom-sim-*
          merge-multiple: true
          path: release/

      - name: Package per platform
        run: |
          cd release
          zip -r atom-sim-linux-x86_64.zip atom-sim-linux/
          zip -r atom-sim-macos-arm64.zip atom-sim-macos/
          zip -r atom-sim-windows-x86_64.zip atom-sim-windows/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
